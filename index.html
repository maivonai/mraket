<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TON Маркет</title>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { text-align: center; }
    .product { background: #222; padding: 15px; margin: 15px 0; border-radius: 12px; }
    button { background: #00ff9d; color: #000; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #555; }
    #status { margin-top: 20px; padding: 15px; background: #333; border-radius: 8px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🎉 TON Маркет</h1>
  <p style="text-align:center;">Простой магазин. Подключи кошелёк и покупай за TON!</p>

  <div id="connect-btn"></div>

  <div id="products">
    <!-- товары добавятся через JS -->
  </div>

  <div id="status"></div>

  <script>
    // ←←← ВСТАВЬ СВОЙ КОШЕЛЁК ЗДЕСЬ ↓↓↓
    const YOUR_WALLET = 'EQ...твой_EQ_адрес_кошелька_сюда...';

    const products = [
      { id: 1, name: 'Крутая футболка', price: 2.5, desc: 'Ограниченная серия' },
      { id: 2, name: 'Подписка на 1 месяц', price: 1.0, desc: 'Премиум-доступ' },
      { id: 3, name: 'NFT-картинка', price: 5.0, desc: 'Уникальный арт' },
    ];

    // Инициализация TON Connect
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://твой-юзернейм.github.io/ton-market/tonconnect-manifest.json',
      buttonRootId: 'connect-btn',
      actionsConfiguration: {
        twaReturnUrl: 'https://t.me/ТВОЙ_БОТ_USERNAME'  // замени на свой бот
      }
    });

    let isConnected = false;

    // Обновление статуса подключения
    tonConnectUI.onStatusChange(wallet => {
      isConnected = !!wallet;
      if (isConnected) {
        document.getElementById('status').innerHTML = '✅ Кошелёк подключён';
      }
    });

    // Создаём карточки товаров
    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      
      products.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <h3>${product.name}</h3>
          <p>${product.desc}</p>
          <strong>${product.price} TON</strong><br>
          <button onclick="buy(${product.id})">Купить за ${product.price} TON</button>
        `;
        container.appendChild(div);
      });
    }

    // Функция покупки
    async function buy(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      if (!isConnected) {
        await tonConnectUI.openModal();
        return;
      }

      const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [{
          address: YOUR_WALLET,
          amount: (product.price * 1e9).toString()  // переводим в нанотоны
        }]
      };

      try {
        document.getElementById('status').innerHTML = `Отправка ${product.price} TON за "${product.name}"...`;
        await tonConnectUI.sendTransaction(transaction);
        document.getElementById('status').innerHTML = `✅ Успешно! ${product.price} TON отправлено тебе.<br>Проверь на tonviewer.io`;
      } catch (e) {
        document.getElementById('status').innerHTML = '❌ Отменено или ошибка';
      }
    }

    // Запуск
    renderProducts();
  </script>
</body>
</html>
