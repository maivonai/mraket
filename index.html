<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TON Маркет</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 255 157 / 0.2); }
    .neon-text { text-shadow: 0 0 15px rgb(0 255 157); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-12 border-b border-zinc-800 pb-6">
      <div>
        <h1 class="text-5xl font-bold neon-text tracking-tighter">TON МАРКЕТ</h1>
        <p class="text-emerald-400 text-sm mt-1">Покупай мгновенно • Деньги сразу на мой кошелёк</p>
      </div>
      <div id="connect-btn" class="flex items-center gap-3"></div>
    </div>

    <!-- Hero -->
    <div class="text-center mb-16">
      <div class="inline-flex items-center gap-2 bg-zinc-900 border border-emerald-500/30 rounded-full px-6 py-2 text-sm mb-4">
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
        Работает на TON Blockchain
      </div>
      <h2 class="text-4xl font-semibold mb-3">Выбирай товар — плати TON</h2>
      <p class="text-zinc-400 max-w-md mx-auto">Подключи Tonkeeper или Telegram Wallet и покупай за секунды</p>
    </div>

    <!-- Products -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="products">
      <!-- Карточки добавятся через JS -->
    </div>

    <!-- Status -->
    <div id="status" class="mt-12 max-w-md mx-auto text-center p-6 rounded-2xl bg-zinc-900 border border-zinc-800 hidden">
    </div>

    <!-- Footer -->
    <div class="mt-20 text-center text-zinc-500 text-sm">
      Все платежи идут напрямую на мой кошелёк<br>
      <span class="text-emerald-400">UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI</span>
    </div>
  </div>

  <script>
    // ТВОЙ КОШЕЛЁК (уже вставлен)
    const YOUR_WALLET = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

    const products = [
      { id: 1, name: 'TON Футболка', price: 2.5, desc: 'Ограниченная серия • Чёрный неон', img: 'https://picsum.photos/id/1015/600/400' },
      { id: 2, name: 'Премиум подписка', price: 1.0, desc: '1 месяц эксклюзивного контента', img: 'https://picsum.photos/id/201/600/400' },
      { id: 3, name: 'Эксклюзивный NFT', price: 5.0, desc: 'Уникальный цифровой арт', img: 'https://picsum.photos/id/30/600/400' },
      { id: 4, name: 'TON Худи', price: 3.5, desc: 'Тёплый мерч с неоновой вышивкой', img: 'https://picsum.photos/id/160/600/400' }
    ];

    // Инициализация Tailwind
    function initTailwind() {
      // уже работает через CDN
    }

    // Инициализация TON Connect
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://maivonai.github.io/mraket/tonconnect-manifest.json',
      buttonRootId: 'connect-btn',
      actionsConfiguration: {
        twaReturnUrl: 'https://t.me/ТВОЙ_БОТ_USERNAME'   // ←←← ЗАМЕНИ НА СВОЙ БОТ!!!
      }
    });

    let isConnected = false;

    tonConnectUI.onStatusChange(wallet => {
      isConnected = !!wallet;
      if (isConnected) {
        showStatus('✅ Кошелёк подключён', 'emerald');
      }
    });

    function showStatus(text, color = 'emerald') {
      const statusEl = document.getElementById('status');
      statusEl.className = `mt-12 max-w-md mx-auto text-center p-6 rounded-2xl bg-zinc-900 border border-${color}-500/30 flex items-center gap-3`;
      statusEl.innerHTML = `
        <div class="flex-1 text-left">${text}</div>
      `;
      statusEl.classList.remove('hidden');
      setTimeout(() => statusEl.classList.add('hidden'), 8000);
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      
      products.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';
        div.innerHTML = `
          <img src="${product.img}" class="w-full h-56 object-cover">
          <div class="p-6">
            <h3 class="text-2xl font-semibold mb-1">${product.name}</h3>
            <p class="text-zinc-400 text-sm mb-4">${product.desc}</p>
            <div class="flex items-center justify-between">
              <div>
                <span class="text-3xl font-bold text-emerald-400">${product.price}</span>
                <span class="text-zinc-500 ml-1">TON</span>
              </div>
              <button onclick="buy(${product.id})" 
                      class="bg-emerald-500 hover:bg-emerald-400 text-black font-semibold px-8 py-3 rounded-2xl transition">
                Купить
              </button>
            </div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    window.buy = async function(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      if (!isConnected) {
        await tonConnectUI.openModal();
        return;
      }

      const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [{
          address: YOUR_WALLET,
          amount: (product.price * 1_000_000_000).toString()
        }]
      };

      try {
        showStatus(`Отправляем ${product.price} TON за "${product.name}"...`, 'yellow');
        await tonConnectUI.sendTransaction(transaction);
        showStatus(`✅ Успешно! ${product.price} TON уже у тебя на кошельке.<br>Спасибо за покупку!`, 'emerald');
      } catch (e) {
        showStatus('❌ Платёж отменён или произошла ошибка', 'red');
      }
    };

    // Запуск
    renderProducts();
  </script>
</body>
</html>
