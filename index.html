<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MRAKET • TON Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .neon { text-shadow: 0 0 20px rgb(0 255 157); }
    .product-card { transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); }
    .product-card:hover { transform: scale(1.03); }
    .price-tag { background: rgba(0, 255, 157, 0.9); }
    .tab-active { border-bottom: 3px solid #00ff9d; color: #00ff9d; }
  </style>
</head>
<body class="bg-black text-white min-h-screen pb-20">
  <!-- HEADER как в Portals -->
  <header class="sticky top-0 bg-black border-b border-zinc-800 z-50">
    <div class="max-w-5xl mx-auto px-4 flex items-center justify-between h-14">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-emerald-500 rounded-xl flex items-center justify-center text-black font-black text-xl">M</div>
        <h1 class="text-2xl font-bold tracking-tighter neon">MRAKET</h1>
      </div>
      
      <!-- Поиск -->
      <div class="flex-1 max-w-md mx-6">
        <input id="search" 
               type="text" 
               placeholder="Поиск товаров..." 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl py-2.5 px-5 text-sm focus:outline-none focus:border-emerald-500">
      </div>

      <div id="connect-btn" class="flex items-center"></div>
    </div>

    <!-- Табы как в Portals -->
    <div class="max-w-5xl mx-auto px-4 flex gap-8 text-sm font-medium border-t border-zinc-800">
      <button onclick="switchTab(0)" class="tab px-4 py-4 tab-active" id="tab-0">All items</button>
      <button onclick="switchTab(1)" class="tab px-4 py-4" id="tab-1">Collections</button>
      <button onclick="switchTab(2)" class="tab px-4 py-4" id="tab-2">Merch</button>
      <button onclick="switchTab(3)" class="tab px-4 py-4" id="tab-3">Gifts</button>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-4 pt-6">
    <!-- Секция Trending -->
    <div class="mb-8">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Trending now 🔥</h2>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="products">
        <!-- JS заполнит -->
      </div>
    </div>
  </div>

  <!-- Статус -->
  <div id="status" class="fixed bottom-4 left-1/2 -translate-x-1/2 max-w-md w-full px-4 hidden"></div>

  <script>
    const YOUR_WALLET = 'UQDLUQwxUttwdqd4VBOpqAAHwzPH_O7QTCVhCceKuDyh-DKI';

    const products = [
      { id: 1, name: "Secret Portal #142", price: 3.2, img: "https://picsum.photos/id/1015/600/600", category: 0 },
      { id: 2, name: "TON Hoodie Limited", price: 2.8, img: "https://picsum.photos/id/160/600/600", category: 2 },
      { id: 3, name: "Gift Box Surprise", price: 1.5, img: "https://picsum.photos/id/201/600/600", category: 3 },
      { id: 4, name: "Cyber Cat NFT", price: 8.5, img: "https://picsum.photos/id/30/600/600", category: 1 },
      { id: 5, name: "Neon Sticker Pack", price: 0.9, img: "https://picsum.photos/id/251/600/600", category: 3 },
      { id: 6, name: "TON Cap Exclusive", price: 1.9, img: "https://picsum.photos/id/160/600/600", category: 2 }
    ];

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://maivonai.github.io/mraket/tonconnect-manifest.json',
      buttonRootId: 'connect-btn',
      actionsConfiguration: {
        twaReturnUrl: 'https://t.me/ТВОЙ_БОТ_USERNAME'   // ←←← ЗАМЕНИ НА СВОЙ БОТ
      }
    });

    let isConnected = false;
    let currentTab = 0;

    tonConnectUI.onStatusChange(wallet => {
      isConnected = !!wallet;
    });

    function showStatus(text, color = 'emerald') {
      const el = document.getElementById('status');
      el.className = `px-6 py-4 rounded-3xl text-center font-medium shadow-2xl ${color === 'emerald' ? 'bg-emerald-500 text-black' : 'bg-red-500 text-white'}`;
      el.innerHTML = text;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function renderProducts(filteredProducts) {
      const container = document.getElementById('products');
      container.innerHTML = '';
      
      filteredProducts.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product-card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer';
        div.innerHTML = `
          <div class="relative">
            <img src="${p.img}" class="w-full aspect-square object-cover">
            <div class="price-tag absolute top-3 right-3 text-black text-sm font-bold px-4 py-1 rounded-2xl">
              ${p.price} TON
            </div>
          </div>
          <div class="p-4">
            <h3 class="font-semibold">${p.name}</h3>
            <button onclick="buy(${p.id}); event.stopImmediatePropagation()" 
                    class="mt-4 w-full bg-white hover:bg-emerald-400 text-black font-bold py-3 rounded-2xl transition">
              BUY NOW
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    window.buy = async function(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      if (!isConnected) {
        await tonConnectUI.openModal();
        return;
      }

      const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [{ address: YOUR_WALLET, amount: (product.price * 1_000_000_000).toString() }]
      };

      try {
        showStatus(`Отправка ${product.price} TON за ${product.name}...`, 'emerald');
        await tonConnectUI.sendTransaction(transaction);
        showStatus(`✅ ${product.price} TON у тебя! Спасибо за покупку 🎉`, 'emerald');
      } catch (e) {
        showStatus('❌ Платёж отменён', 'red');
      }
    };

    window.switchTab = function(tabIndex) {
      currentTab = tabIndex;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('tab-active', i === tabIndex);
      });

      const filtered = tabIndex === 0 
        ? products 
        : products.filter(p => p.category === tabIndex);
      
      renderProducts(filtered);
    };

    // Запуск
    renderProducts(products);
  </script>
</body>
</html>
